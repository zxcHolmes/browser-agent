<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>

  <!-- Browser window frame -->
  <rect x="14" y="22" width="100" height="72" rx="8" fill="none" stroke="#334155" stroke-width="2.5"/>

  <!-- Browser top bar -->
  <rect x="14" y="22" width="100" height="18" rx="8" fill="#1e293b"/>
  <rect x="14" y="31" width="100" height="9" fill="#1e293b"/>

  <!-- Traffic lights -->
  <circle cx="28" cy="31" r="3.5" fill="#ef4444" opacity="0.8"/>
  <circle cx="40" cy="31" r="3.5" fill="#f59e0b" opacity="0.8"/>
  <circle cx="52" cy="31" r="3.5" fill="#22c55e" opacity="0.8"/>

  <!-- Address bar -->
  <rect x="62" y="25" width="44" height="12" rx="6" fill="#0f172a" opacity="0.8"/>

  <!-- Content area - circuit/neural network pattern -->
  <g opacity="0.25" stroke="#7c3aed" stroke-width="1" fill="none">
    <line x1="30" y1="55" x2="55" y2="55"/>
    <line x1="55" y1="55" x2="55" y2="70"/>
    <line x1="55" y1="70" x2="75" y2="70"/>
    <line x1="75" y1="55" x2="100" y2="55"/>
    <line x1="75" y1="55" x2="75" y2="70"/>
    <line x1="40" y1="70" x2="40" y2="82"/>
    <line x1="40" y1="82" x2="90" y2="82"/>
    <line x1="90" y1="70" x2="90" y2="82"/>
  </g>

  <!-- Central AI spark / agent icon -->
  <g transform="translate(64, 62)">
    <!-- Outer ring -->
    <circle r="16" fill="url(#accent)" opacity="0.15"/>
    <circle r="16" fill="none" stroke="url(#glow)" stroke-width="1.5" opacity="0.6"/>
    <!-- Inner core -->
    <circle r="8" fill="url(#accent)"/>
    <!-- Spark rays -->
    <g stroke="url(#glow)" stroke-width="1.5" stroke-linecap="round">
      <line x1="0" y1="-11" x2="0" y2="-19"/>
      <line x1="0" y1="11" x2="0" y2="19"/>
      <line x1="-11" y1="0" x2="-19" y2="0"/>
      <line x1="11" y1="0" x2="19" y2="0"/>
      <line x1="-7.8" y1="-7.8" x2="-13.4" y2="-13.4"/>
      <line x1="7.8" y1="-7.8" x2="13.4" y2="-13.4"/>
      <line x1="-7.8" y1="7.8" x2="-13.4" y2="13.4"/>
      <line x1="7.8" y1="7.8" x2="13.4" y2="13.4"/>
    </g>
    <!-- Center dot -->
    <circle r="3" fill="#e2e8f0"/>
  </g>

  <!-- Bottom bar indicator dots -->
  <g transform="translate(64, 106)">
    <circle r="3" fill="url(#glow)" opacity="0.9"/>
    <circle cx="-10" cy="0" r="2" fill="#334155"/>
    <circle cx="10" cy="0" r="2" fill="#334155"/>
  </g>
</svg>
